<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Personal portfolio of a software engineer. Selected projects, experience, and writing."
    />
    <meta name="theme-color" content="#fde2c7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1e1b4b" media="(prefers-color-scheme: dark)" />

    <meta property="og:title" content="Sarthak Dixit — software engineer" />
    <meta
      property="og:description"
      content="Personal portfolio of a software engineer. Selected projects, experience, and writing."
    />
    <meta property="og:type" content="website" />

    <title>Sarthak Dixit</title>

    <!--
      Anti-flash theme script. Runs synchronously before React hydrates so the
      correct theme class is applied before first paint. Do not remove or move.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          // Dark is always the default. The site loads in dark mode for
          // every visitor unless they have explicitly toggled to light, in
          // which case their stored preference wins.
          var theme = stored === 'light' ? 'light' : 'dark';
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.colorScheme = theme;
        } catch (e) {
          // localStorage unavailable (private mode); default to dark.
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
  </head>
  <body class="text-zinc-900 dark:text-zinc-100 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
